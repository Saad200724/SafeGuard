name: safeguard_child_app
description: A child safety monitoring application that integrates with the SafeGuard Parent Dashboard.
version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  
  # State management
  provider: ^6.0.5
  flutter_bloc: ^8.1.2
  
  # UI components
  google_fonts: ^4.0.3
  flutter_svg: ^2.0.5
  font_awesome_flutter: ^10.4.0
  animations: ^2.0.7
  shimmer: ^2.0.0
  lottie: ^2.3.2
  
  # Navigation
  go_router: ^7.0.0
  
  # Network and data
  http: ^0.13.5
  dio: ^5.1.1
  supabase_flutter: ^1.10.4
  shared_preferences: ^2.1.0
  sqflite: ^2.2.8+4
  path_provider: ^2.0.14
  
  # Authentication
  local_auth: ^2.1.6
  
  # Location services
  geolocator: ^9.0.2
  google_maps_flutter: ^2.2.6
  
  # Device capabilities
  device_info_plus: ^8.2.2
  app_usage: ^2.1.1
  battery_plus: ^3.0.3
  permission_handler: ^10.2.0
  flutter_background: ^1.2.0
  background_fetch: ^1.1.6
  sensors_plus: ^3.0.0
  
  # Utils
  intl: ^0.18.0
  url_launcher: ^6.1.10
  package_info_plus: ^3.1.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  build_runner: ^2.3.3
  json_serializable: ^6.6.2
  flutter_launcher_icons: ^0.13.1
  
flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
  # Note: Actual app would include additional image assets
  # fonts:
  #  - family: Schyler
  #    fonts:
  #      - asset: fonts/Schyler-Regular.ttf

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"